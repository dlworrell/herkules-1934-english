name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Check sources
        run: make check
      - name: Build all outputs
        run: make all
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: herkules-output
          path: output/
