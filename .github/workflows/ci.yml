name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: python -m pip install -e .

      - name: Run legacy checks
        run: make check

      - name: Check EDT dependency
        run: make edt-check

      - name: Run EDT pilot smoke test
        run: make edt-pilot
